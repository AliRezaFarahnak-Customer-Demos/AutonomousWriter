name: Auto-Document with Copilot Coding Agent

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.github/copilot-instructions.md'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  trigger-copilot-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ----- Stamp version -----
      - name: Stamp version
        run: |
          VERSION="1.0.0.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^\$Version = \".*\"$/\$Version = \"$VERSION\"/" HelloDocumentationAgent.ps1

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HelloDocumentationAgent.ps1
          git diff --cached --quiet && exit 0
          git commit -m "ci: bump version to $VERSION [skip ci]"
          git push

      # ----- Mint GitHub App token with explicit permissions -----
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: AutonomousWriter
          permissions: >-
            {"actions":"write","contents":"write","issues":"write","pull_requests":"write","metadata":"read"}

      # ----- Assign issue to Copilot Coding Agent -----
      - name: Create issue and assign to Copilot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          DIFF=$(git diff HEAD~1 HEAD -- . ':!docs/' ':!.github/' | head -c 3000)
          SHA=${GITHUB_SHA::7}
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          BUILD="${{ github.run_number }}"

          # Step 1: Create the issue (without assignee)
          ISSUE_URL=$(jq -n \
            --arg title "📝 Document changes for v${VERSION}" \
            --arg body "$(printf 'Update docs/CHANGELOG.md — append a **v%s** entry.\n\n**Commit:** `%s` by @%s\n**Build:** #%s\n\n```diff\n%s\n```' "$VERSION" "$SHA" "$ACTOR" "$BUILD" "$DIFF")" \
            '{ title: $title, body: $body }' | \
            gh api --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "/repos/${REPO}/issues" \
              --input - --jq '.number')

          echo "Created issue #${ISSUE_URL}"

          # Step 2: Assign copilot-swe-agent[bot] via PATCH (update issue)
          jq -n \
            --arg repo "$REPO" \
            '{
              assignees: ["copilot-swe-agent[bot]"],
              agent_assignment: {
                target_repo: $repo,
                base_branch: "main",
                custom_instructions: "Only modify docs/CHANGELOG.md. Append at the bottom. Follow .github/copilot-instructions.md.",
                custom_agent: "",
                model: ""
              }
            }' | gh api --method PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "/repos/${REPO}/issues/${ISSUE_URL}" \
              --input -

          echo "Assigned copilot to issue #${ISSUE_URL}"
