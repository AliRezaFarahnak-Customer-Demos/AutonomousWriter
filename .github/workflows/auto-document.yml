name: Auto-Document with Copilot Coding Agent

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.github/copilot-instructions.md'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  trigger-copilot-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Create issue and assign to Copilot
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
          VERSION: "1.0.0.${{ github.run_number }}"
        run: |
          DIFF=$(git diff HEAD~1 HEAD -- . ':!docs/' ':!.github/' | head -c 3000)
          SHA=${GITHUB_SHA::7}
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          OWNER="${REPO%%/*}"
          REPONAME="${REPO##*/}"
          BOT_ID="BOT_kgDOC9w8XQ"

          REPO_ID=$(gh api graphql -f query="
            query {
              repository(owner: \"${OWNER}\", name: \"${REPONAME}\") { id }
            }" --jq '.data.repository.id')

          BODY=$(printf 'Update docs/CHANGELOG.md — append a **v%s** entry.\n\n**Commit:** \x60%s\x60 by @%s\n**Build:** #%s\n\n\x60\x60\x60diff\n%s\n\x60\x60\x60' "$VERSION" "$SHA" "$ACTOR" "${{ github.run_number }}" "$DIFF")

          gh api graphql \
            -H "GraphQL-Features: issues_copilot_assignment_api_support,coding_agent_model_selection" \
            -f query='mutation($title: String!, $body: String!, $repoId: ID!, $botId: ID!) {
              createIssue(input: {
                repositoryId: $repoId,
                title: $title,
                body: $body,
                assigneeIds: [$botId],
                agentAssignment: {
                  targetRepositoryId: $repoId,
                  baseRef: "main",
                    customInstructions: "Only modify docs/CHANGELOG.md. Append at the bottom. Follow .github/copilot-instructions.md. You MUST open a pull request with your changes.",
                  customAgent: "",
                  model: ""
                }
              }) {
                issue {
                  number
                  title
                  assignees(first: 5) { nodes { login } }
                }
              }
            }' \
            -f "title=📝 Document changes for v${VERSION}" \
            -f "body=${BODY}" \
            -f "repoId=${REPO_ID}" \
            -f "botId=${BOT_ID}"
