name: Auto-Document with Copilot Coding Agent

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.github/copilot-instructions.md'
      - 'README.md'

permissions:
  contents: write
  issues: write

jobs:
  stamp-version-and-trigger-docs:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------------
      # 1. Checkout the repo
      # ---------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2          # need parent commit for diff

      # ---------------------------------------------------------------
      # 2. Stamp the version in the PowerShell script
      # ---------------------------------------------------------------
      - name: Stamp version
        run: |
          VERSION="1.0.0.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^\$Version = \".*\"$/\$Version = \"$VERSION\"/" HelloDocumentationAgent.ps1
          echo "Stamped version: $VERSION"

      # ---------------------------------------------------------------
      # 3. Commit the version bump (skip CI to avoid loop)
      # ---------------------------------------------------------------
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HelloDocumentationAgent.ps1
          # Only commit if there are changes
          git diff --cached --quiet && echo "No version change" && exit 0
          git commit -m "ci: bump version to ${{ env.VERSION }} [skip ci]"
          git push

      # ---------------------------------------------------------------
      # 4. Collect the diff for context
      # ---------------------------------------------------------------
      - name: Collect diff
        id: diff
        run: |
          DIFF=$(git diff HEAD~1 HEAD -- . ':!docs/' ':!.github/' | head -c 3000)
          # Escape for GitHub Actions multi-line output
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "diff<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # 5. Trigger Copilot Coding Agent via an assigned issue
      # ---------------------------------------------------------------
      # ---------------------------------------------------------------
      # 5. Ensure labels exist (uses GITHUB_TOKEN — fine for labels)
      # ---------------------------------------------------------------
      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = [
              { name: 'documentation', color: '0075ca', description: 'Improvements or additions to documentation' },
              { name: 'copilot-agent', color: 'a2eeef', description: 'Managed by Copilot Coding Agent' }
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label
                });
              }
            }

      # ---------------------------------------------------------------
      # 6. Create issue & assign to Copilot Coding Agent via REST API
      #    Uses COPILOT_PAT (a fine-grained PAT with repo read/write
      #    on metadata, actions, contents, issues, pull_requests).
      #    The assignee MUST be "copilot-swe-agent[bot]" and the
      #    request body MUST include the "agent_assignment" object.
      #    See: https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/create-a-pr#using-the-rest-api
      # ---------------------------------------------------------------
      - name: Create issue and assign to Copilot Coding Agent
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
          VERSION: ${{ env.VERSION }}
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          ACTOR="${{ github.actor }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          DIFF=$(git diff HEAD~1 HEAD -- . ':!docs/' ':!.github/' | head -c 3000)

          # Build issue body as a JSON-safe string
          BODY=$(cat <<BODYEOF
          ## Auto-Documentation Request — v${VERSION}

          **Commit:** \`${SHA}\` by @${ACTOR}
          **Build:** #${{ github.run_number }}

          ### Instructions

          1. Open \`docs/CHANGELOG.md\`.
          2. Append a new section at the **bottom** of the file using this format:

          \`\`\`markdown
          ## v${VERSION}

          **Date:** $(date -u +%Y-%m-%d)
          **Commit:** \`${SHA}\`
          **Author:** @${ACTOR}

          ### Changes

          - (summarize each meaningful change from the diff below)
          \`\`\`

          ### Diff for context

          \`\`\`diff
          ${DIFF:-_No code diff detected (docs-only or config change)._}
          \`\`\`
          BODYEOF
          )

          # Create the issue AND assign copilot-swe-agent[bot] with agent_assignment
          # Per GitHub docs: https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/create-a-pr#creating-a-new-issue
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${OWNER}/${REPO}/issues" \
            -f title="📝 Document changes for v${VERSION}" \
            -f body="${BODY}" \
            -f 'assignees[]=copilot-swe-agent[bot]' \
            -f "agent_assignment[target_repo]=${OWNER}/${REPO}" \
            -f "agent_assignment[base_branch]=main" \
            -f "agent_assignment[custom_instructions]=Follow the rules in .github/copilot-instructions.md. Only modify docs/CHANGELOG.md. Append the new version entry at the bottom." \
            -f "agent_assignment[custom_agent]=" \
            -f "agent_assignment[model]="

          echo "✅ Issue created and assigned to Copilot Coding Agent"

            console.log(`Assigned copilot to issue #${issue.number}`);
