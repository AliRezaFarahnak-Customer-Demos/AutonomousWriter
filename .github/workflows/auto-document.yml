name: Auto-Document with Copilot Coding Agent

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.github/copilot-instructions.md'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  trigger-copilot-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ----- Stamp version -----
      - name: Stamp version
        run: |
          VERSION="1.0.0.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^\$Version = \".*\"$/\$Version = \"$VERSION\"/" HelloDocumentationAgent.ps1

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HelloDocumentationAgent.ps1
          git diff --cached --quiet && exit 0
          git commit -m "ci: bump version to $VERSION [skip ci]"
          git push

      # ----- Mint GitHub App token -----
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # ----- Assign issue to Copilot Coding Agent -----
      - name: Create issue and assign to Copilot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          DIFF=$(git diff HEAD~1 HEAD -- . ':!docs/' ':!.github/' | head -c 3000)
          SHA=${GITHUB_SHA::7}

          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/issues \
            -f title="📝 Document changes for v$VERSION" \
            -f body="Update docs/CHANGELOG.md — append a **v$VERSION** entry.

          **Commit:** \`$SHA\` by @${{ github.actor }}
          **Build:** #${{ github.run_number }}

          \`\`\`diff
          ${DIFF:-no diff}
          \`\`\`" \
            -f 'assignees[]=copilot-swe-agent[bot]' \
            -f "agent_assignment[target_repo]=${{ github.repository }}" \
            -f "agent_assignment[base_branch]=main" \
            -f "agent_assignment[custom_instructions]=Only modify docs/CHANGELOG.md. Append at the bottom. Follow .github/copilot-instructions.md." \
            -f "agent_assignment[custom_agent]=" \
            -f "agent_assignment[model]="
