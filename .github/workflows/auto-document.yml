name: Auto-Document with Copilot Coding Agent

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.github/copilot-instructions.md'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  trigger-copilot-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ----- Stamp version -----
      - name: Stamp version
        run: |
          VERSION="1.0.0.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^\$Version = \".*\"$/\$Version = \"$VERSION\"/" HelloDocumentationAgent.ps1

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HelloDocumentationAgent.ps1
          git diff --cached --quiet && exit 0
          git commit -m "ci: bump version to $VERSION [skip ci]"
          git push

      # ----- Mint GitHub App token (all app permissions, no restrictions) -----
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # ----- Assign issue to Copilot Coding Agent -----
      - name: Create issue and assign to Copilot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          DIFF=$(git diff HEAD~1 HEAD -- . ':!docs/' ':!.github/' | head -c 3000)
          SHA=${GITHUB_SHA::7}
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          BUILD="${{ github.run_number }}"

          # Step 1: Create the issue (without assignee)
          ISSUE_URL=$(jq -n \
            --arg title "📝 Document changes for v${VERSION}" \
            --arg body "$(printf 'Update docs/CHANGELOG.md — append a **v%s** entry.\n\n**Commit:** `%s` by @%s\n**Build:** #%s\n\n```diff\n%s\n```' "$VERSION" "$SHA" "$ACTOR" "$BUILD" "$DIFF")" \
            '{ title: $title, body: $body }' | \
            gh api --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "/repos/${REPO}/issues" \
              --input - --jq '.number')

          echo "Created issue #${ISSUE_URL}"

          # Step 2: Ensure coding agent is enabled for this repo via Management API
          REPO_NUMERIC_ID=$(gh api "/repos/${REPO}" --jq '.id')
          gh api --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/orgs/${REPO%%/*}/copilot/coding-agent/permissions/repositories/${REPO_NUMERIC_ID}" || true

          # Step 3: Get repo and issue IDs, then assign via GraphQL
          OWNER="${REPO%%/*}"
          REPONAME="${REPO##*/}"

          # Copilot bot global node ID (constant across all repos)
          BOT_ID="BOT_kgDOC9w8XQ"

          REPO_ID=$(gh api graphql -f query="
            query {
              repository(owner: \"${OWNER}\", name: \"${REPONAME}\") { id }
            }" --jq '.data.repository.id')

          ISSUE_ID=$(gh api graphql -f query="
            query {
              repository(owner: \"${OWNER}\", name: \"${REPONAME}\") {
                issue(number: ${ISSUE_URL}) { id }
              }
            }" --jq '.data.repository.issue.id')

          echo "Bot=$BOT_ID Repo=$REPO_ID Issue=$ISSUE_ID"

          # Assign copilot via GraphQL mutation
          gh api graphql \
            -H "GraphQL-Features: issues_copilot_assignment_api_support,coding_agent_model_selection" \
            -f query="
              mutation {
                addAssigneesToAssignable(input: {
                  assignableId: \"${ISSUE_ID}\",
                  assigneeIds: [\"${BOT_ID}\"],
                  agentAssignment: {
                    targetRepositoryId: \"${REPO_ID}\",
                    baseRef: \"main\",
                    customInstructions: \"Only modify docs/CHANGELOG.md. Append at the bottom. Follow .github/copilot-instructions.md.\",
                    customAgent: \"\",
                    model: \"\"
                  }
                }) {
                  assignable {
                    ... on Issue {
                      id
                      title
                      assignees(first: 10) {
                        nodes { login }
                      }
                    }
                  }
                }
              }"

          echo "Assigned copilot to issue #${ISSUE_URL} via GraphQL"
